<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>PANEL POP</title>
<style>
  html, body {
    margin: 0; padding: 0;
    background: #08081a;
    height: 100%;
    overflow: hidden;
    touch-action: none;
  }
  body {
    display: flex;
    align-items: center;
    justify-content: center;
  }
  canvas {
    image-rendering: pixelated;
    image-rendering: crisp-edges;
    background: #0e0e22;
  }
</style>
</head>
<body>
<canvas id="game"></canvas>
<script src="js/rng.js?v=0.7.0"></script>
<script src="js/engine.js?v=0.7.0"></script>
<script src="js/save.js?v=0.7.0"></script>
<script src="js/font.js?v=0.7.0"></script>
<script src="js/sprites.js?v=0.7.0"></script>
<script src="js/audio.js?v=0.7.0"></script>
<script src="js/input.js?v=0.7.0"></script>
<script src="js/touchpad.js?v=0.7.0"></script>
<script src="js/fx.js?v=0.7.0"></script>
<script src="js/backgrounds.js?v=0.7.0"></script>
<script src="js/render.js?v=0.7.0"></script>
<script src="js/ai.js?v=0.7.0"></script>
<script src="js/puzzle.js?v=0.7.0"></script>
<script src="js/story.js?v=0.7.0"></script>
<!-- online (leaderboards + versus). Firebase loads from CDN; if it fails
     (offline) the game just runs local — net.js guards everything. -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script src="js/firebase-config.js?v=0.7.0"></script>
<script src="js/net.js?v=0.7.0"></script>
<script src="js/main.js?v=0.7.0"></script>
</body>
</html>
